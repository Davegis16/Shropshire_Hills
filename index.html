<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
    <title>Shropshire Hill Tops</title>

    <link rel="stylesheet" href="vendor/@arcgis/core/assets/esri/themes/light/main.css" />
    <style>
      :root {
        --page-bar-height: 48px;
      }

      html,
      body,
      #viewDiv {
        padding: 0;
        margin: 0;
        height: 100%;
        width: 100%;
      }

      body {
        background-color: #f4efe3;
        font-family: "Open Sans", "Segoe UI", Arial, sans-serif;
      }

      canvas {
        filter: drop-shadow(0px 0px 5px #56481f);
      }

      .esri-widget {
        background-color: transparent;
      }

      .esri-widget--button {
        background-color: transparent;
      }

      .esri-ui-corner .esri-component {
        box-shadow: none;
      }

      .esri-zoom .esri-widget--button:last-child {
        border-top: 1px solid #56481f;
      }

      .esri-navigation-toggle:hover,
      .esri-navigation-toggle:focus {
        background-color: transparent;
      }

      .esri-widget--button {
        color: #56481f;
        background-color: #f4efe3;
        border: 1px solid #56481f;
        border-radius: 50%;
        margin-top: 3px;
      }

      .esri-widget--button:hover {
        background-color: #c9c1ae;
        color: #56481f;
      }

      .esri-attribution__sources[role="button"] {
        color: #56481f;
      }

      .page-bar {
        position: absolute;
        left: 0;
        z-index: 10;
        width: 100%;
        box-sizing: border-box;
        min-height: var(--page-bar-height);
        background-color: #f4efe3;
        color: #56481f;
        font-size: 1.35em;
        line-height: 1.15em;
        padding: 0.75em 1.55em;
      }

      .page-header {
        top: 0;
        border-bottom: 1px solid rgba(86, 72, 31, 0.35);
        font-weight: bold;
      }

      .page-footer {
        bottom: 0;
        border-top: 1px solid rgba(86, 72, 31, 0.35);
      }

      #contentDiv {
        position: absolute;
        top: var(--page-bar-height);
        right: 0;
        min-width: 220px;
        width: 22%;
        max-height: calc(100% - (var(--page-bar-height) * 2));
        background-color: #f4efe3;
        color: #56481f;
        padding: 1.35em;
        font-size: 13px;
        line-height: 1.45em;
        overflow: hidden;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
      }

      h1 {
        padding: 0.75em 0 0.65em;
        margin: 0;
        font-size: 1.35em;
        line-height: 1.15em;
      }

      .title {
        cursor: pointer;
        padding: 1.5em 0 0.5em;
        margin: 0;
        font-weight: bold;
      }

      .map-icon {
        height: 20px;
        vertical-align: middle;
      }

      .indicator {
        cursor: pointer;
        border-bottom: 1px dashed #56481f;
      }

      .indicator:hover {
        border-bottom: 1px solid #56481f;
      }

      footer {
        font-size: 0.25em;
        line-height: 1.3em;
        border-top: 1px solid #56481f;
        padding-top: 2em;
        margin-top: 2em;
      }

      footer > a {
        text-decoration: none;
        border-bottom: 1px dashed #56481f;
        color: #56481f;
      }

      footer > a:hover {
        border-bottom: 1px solid #56481f;
      }

      .hill-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.92em;
        line-height: 1.25em;
      }

      .hill-table-wrap {
        min-height: 0;
        overflow-y: auto;
        flex: 1;
      }

      .hill-table th,
      .hill-table td {
        border-bottom: 1px solid rgba(86, 72, 31, 0.35);
        padding: 0.38em 0;
        text-align: left;
        vertical-align: top;
      }

      .hill-table th:last-child,
      .hill-table td:last-child {
        text-align: right;
        white-space: nowrap;
      }

      .hill-table a {
        color: #56481f;
        text-decoration: none;
        border-bottom: 1px dashed #56481f;
      }

      .hill-table a:hover,
      .hill-table a:focus {
        border-bottom-style: solid;
      }
    </style>

  </head>

    <header class="page-bar page-header">Shropshire Hills National Landscape</header>
    <div id="viewDiv"></div>

      <h1>Shropshire Hill Tops</h1>
